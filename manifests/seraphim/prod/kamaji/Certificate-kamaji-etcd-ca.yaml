apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kamaji-etcd-ca
  namespace: kamaji-system
spec:
  commonName: kamaji-etcd-ca
  duration: 87600h
  isCA: true
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: kamaji-selfsigned-issuer
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: kamaji-etcd-ca
  secretTemplate:
    labels:
      kamaji-etcd.clastix.io/etcd: kamaji-etcd
  usages:
    - crl sign
    - cert sign
