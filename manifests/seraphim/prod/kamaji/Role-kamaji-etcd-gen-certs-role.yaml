apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    helm.sh/hook: pre-install,post-install,pre-delete
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation,hook-failed
    helm.sh/hook-weight: "5"
  labels:
    app.kubernetes.io/instance: kamaji
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kamaji-etcd
    app.kubernetes.io/version: 3.5.17
    helm.sh/chart: kamaji-etcd-0.15.0
  name: kamaji-etcd-gen-certs-role
  namespace: kamaji-system
rules:
  - apiGroups:
      - ""
    resourceNames:
      - kamaji-etcd-certs
      - kamaji-etcd-root-client-certs
    resources:
      - secrets
    verbs:
      - get
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
  - apiGroups:
      - apps
    resourceNames:
      - kamaji-etcd
    resources:
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - patch
