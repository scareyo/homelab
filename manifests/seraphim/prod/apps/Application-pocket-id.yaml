apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  name: pocket-id
  namespace: argocd
spec:
  destination:
    namespace: pocket-id
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: apps
      jqPathExpressions:
        - .spec.updateStrategy.rollingUpdate.maxUnavailable
      kind: StatefulSet
  project: default
  source:
    path: ./manifests/seraphim/prod/pocket-id
    repoURL: https://github.com/scareyo/homelab.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
