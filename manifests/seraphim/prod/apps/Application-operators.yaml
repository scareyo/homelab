apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: operators
  namespace: argocd
spec:
  destination:
    namespace: operators
    server: https://kubernetes.default.svc
  project: system
  source:
    path: ./manifests/seraphim/prod/operators
    repoURL: https://github.com/scareyo/homelab.git
    targetRevision: main
  syncPolicy: {}
