apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  name: cert-manager
  namespace: argocd
spec:
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/seraphim/prod/cert-manager
    repoURL: https://github.com/scareyo/homelab.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
