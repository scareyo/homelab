apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  name: cilium
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/seraphim/prod/cilium
    repoURL: https://github.com/scareyo/homelab.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
