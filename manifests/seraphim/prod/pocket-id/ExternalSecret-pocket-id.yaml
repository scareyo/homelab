apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pocket-id
  namespace: pocket-id
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: /pocket-id/ENCRYPTION_KEY
        metadataPolicy: None
      secretKey: ENCRYPTION_KEY
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target: {}
