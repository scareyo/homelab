              - WEBDL-720p
              - WEBRip-720p
              - HDTV-720p

          - name: Bluray-576p
          - name: Bluray-480p

          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p

          - name: DVD
          - name: SDTV

    custom_format_groups:
      add:
        - trash_id: 9d5acd8f1da78dfbae788182f7605200  # [Audio] Audio Formats
          assign_scores_to:
            - name: Default

