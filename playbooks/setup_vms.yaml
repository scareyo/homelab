---
- name: Register RHEL systems
  hosts: vms
  remote_user: cloud-user
  become: true
  tasks:
    - name: Register as user and auto-subscribe to available content
      redhat_subscription:
        state: present
        username: "{{ vault_redhat_username }}"
        password: "{{ vault_redhat_password }}"
        autosubscribe: true

- name: Setup FreeIPA server
  hosts: ipaserver
  remote_user: cloud-user
  become: true

  roles:
    - role: freeipa.ansible_freeipa.ipaserver
      state: present

  tasks:
    - freeipa.ansible_freeipa.ipauser:
        ipaadmin_password: "{{ vault_ipaadmin_password }}"
        name: scarey
        first: Sam
        last: Carey
        email: sam@scarey.me
        password: "{{ vault_scarey_password }}"
        update_password: on_create

- name: Setup FreeIPA clients
  hosts: ipaclients
  remote_user: cloud-user
  become: true
  roles:
    - role: freeipa.ansible_freeipa.ipaclient
      state: present

- name: Setup Keycloak
  hosts: sso
  remote_user: cloud-user
  become: true
  vars:
    certificate_requests:
      - name: sso
        dns: sso.int.scarey.me
        principal: HTTP/sso.int.scarey.me@INT.SCAREY.ME
        ca: ipa

    keycloak_quarkus_version: "21.0.1"
    keycloak_quarkus_admin_pass: "remembertochangeme"
    #keycloak_quarkus_frontend_url: "https://sso.int.scarey.me/auth"
    #keycloak_quarkus_http_enabled: True
    keycloak_quarkus_host: "sso.int.scarey.me"
    keycloak_quarkus_https_enabled: True
    keycloak_quarkus_http_port: "80"
    keycloak_quarkus_https_port: "443"
    keycloak_quarkus_key_file: /etc/pki/tls/private/sso.key
    keycloak_quarkus_cert_file: /etc/pki/tls/certs/sso.crt
  pre_tasks:
    - name: Ensure requirements in place
      package:
        name:
          - java-1.8.0-openjdk-headless
        state: present
  roles:
    - linux-system-roles.certificate
    - middleware_automation.keycloak.keycloak_quarkus
