---
- name: Provision virtual machines
  hosts: hypervisors
  remote_user: root
  roles:
    - role: libvirt
      vars:
        libvirt_command: new-vm
        libvirt_base_image_name: "rhel-baseos-9.1-x86_64-kvm.qcow2"
        libvirt_base_image_url: ""
        libvirt_base_image_sha: ""
        libvirt_vms:
          - name: idm
            mac_address: "52:54:00:d7:20:50"
            memory: "4096"
            vcpus: "2"
            pool: "default"
            pci_devices: []

    - role: libvirt
      vars:
        libvirt_command: new-vm
        libvirt_base_image_name: "rhel-baseos-9.1-x86_64-kvm.qcow2"
        libvirt_base_image_url: ""
        libvirt_base_image_sha: ""
        libvirt_vms:
          - name: sso
            mac_address: "52:54:00:d7:20:51"
            memory: "2048"
            vcpus: "2"
            pool: "default"
            pci_devices: []

    - role: libvirt
      vars:
        libvirt_command: new-vm
        libvirt_base_image_name: "rhel-baseos-9.1-x86_64-kvm.qcow2"
        libvirt_base_image_url: ""
        libvirt_base_image_sha: ""
        libvirt_vms:
          - name: vpn
            mac_address: "52:54:00:d7:20:52"
            memory: "4096"
            vcpus: "4"
            pool: "default"
            pci_devices: []
