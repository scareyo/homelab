- name: Ensure requirements in place
  package:
    name:
      - cockpit-packagekit
      - cockpit-pcp
      - cockpit-storaged
      - dnf-automatic
    state: present

- name: Start and enable Cockpit
  ansible.builtin.systemd:
    enabled: yes
    state: started
    name: cockpit.socket

- name: Start and enable pmlogger
  ansible.builtin.systemd:
    enabled: yes
    state: started
    name: pmlogger.service

- name: Check for existing RAID device
  stat:
    path: "{{ raid_device }}"
  register: stat_raid_device

- name: Assemble the RAID device
  shell: mdadm --assemble {{ raid_device }} {% for disk in disks %}{{ disk }} {% endfor %}
  when: not stat_raid_device.stat.exists

- name: Mount RAID storage device
  ansible.posix.mount:
    path: /mnt/nami
    src: /dev/md/nami1
    fstype: xfs
    state: mounted

