---
- name: Ensure requirements in place
  package:
    name:
      - guestfs-tools
      - python3-libvirt
    state: present
  become: yes

- name: Get list of VMs
  community.libvirt.virt:
    command: list_vms
  register: vm_list
  changed_when: no

- block:
    - name: Download base image
      get_url:
        url: "{{ base_image_url }}"
        dest: "/tmp/{{ base_image_name }}"
        checksum: "sha256:{{ base_image_sha }}"

    - name: Copy base image to storage pool
      copy:
        dest: "{{ item.path }}/{{ item.name }}.qcow2.tmp"
        src: "/tmp/{{ base_image_name }}"
        force: no
        remote_src: yes
        mode: 0660
      register: copy_results
    
    - name: Create the VM image
      command: |
        qemu-img create -f qcow2 -o preallocation=metadata "{{ item.path }}/{{ item.name }}.qcow2" 32G

    - name: Resize the temporary image
      command: |
        virt-resize --expand /dev/sda1 {{ item.path }}/{{ item.name }}.qcow2.tmp {{ item.path }}/{{ item.name }}.qcow2

    - name: Remove the temporary image
      ansible.builtin.file:
        path: "{{ item.path }}/{{ item.name }}.qcow2.tmp"
        state: absent
  
    - name: Configure the image
      command: |
        virt-customize -a {{ item.path }}/{{ item.name }}.qcow2 \
        --hostname {{ item.name }} \
        --root-password password:changeme \
        --ssh-inject 'root:string:{{ ssh_key }}' \
        --uninstall cloud-init --selinux-relabel
      when: copy_results is changed

    - name: Provision the NAS VM
      community.libvirt.virt:
        command: define
        xml: "{{ lookup('template', 'qemu/vm.xml.j2') }}"
        autostart: yes
